<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat or Dog Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      color: #2d3748;
    }

    p.subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #a0aec0;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab.active {
      color: #667eea;
      border-bottom: 3px solid #667eea;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Upload area */
    .upload-area {
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #a0aec0;
    }

    .upload-area:hover { border-color: #667eea; color: #667eea; background: #f7f8ff; }

    .upload-area input { display: none; }

    .upload-icon { font-size: 3rem; margin-bottom: 10px; }

    /* URL input */
    .url-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .url-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .url-row input:focus { border-color: #667eea; }

    /* Preview */
    #preview-container {
      margin: 20px 0;
      text-align: center;
      display: none;
    }

    #preview-container img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Result */
    #result-box {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      background: linear-gradient(135deg, #667eea15, #764ba215);
      border: 2px solid #667eea40;
    }

    #result-label { font-size: 2rem; font-weight: 800; color: #2d3748; }
    #result-confidence { color: #718096; font-size: 0.95rem; margin-top: 4px; }

    .confidence-bar-wrap {
      background: #e2e8f0;
      border-radius: 999px;
      height: 10px;
      margin-top: 12px;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.8s ease;
    }

    /* Sample Images */
    .samples-title {
      font-size: 1rem;
      font-weight: 700;
      color: #4a5568;
      margin: 28px 0 14px;
    }

    .samples-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .sample-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
    }

    .sample-img:hover { border-color: #667eea; transform: scale(1.05); }
    .sample-img.selected { border-color: #667eea; box-shadow: 0 0 0 3px #667eea40; }

    .sample-label {
      text-align: center;
      font-size: 0.75rem;
      color: #718096;
      margin-top: 4px;
    }

    .error-msg { color: #e53e3e; font-size: 0.9rem; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

  <h1>🐾 Cat or Dog?</h1>
  <p class="subtitle">Upload an image, paste a URL, or try a sample below</p>

  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('upload')">📁 Upload Image</div>
      <div class="tab" onclick="switchTab('url')">🔗 Image URL</div>
    </div>

    <!-- Upload Tab -->
    <div class="tab-content active" id="tab-upload">
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">☁️</div>
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p style="font-size:0.85rem; margin-top:6px;">JPG, PNG, WEBP supported</p>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)" />
      </div>
    </div>

    <!-- URL Tab -->
    <div class="tab-content" id="tab-url">
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://example.com/dog.jpg" />
      </div>
      <button class="btn btn-primary" onclick="loadFromUrl()">Load Image</button>
    </div>

    <!-- Preview -->
    <div id="preview-container">
      <img id="preview" src="" alt="Preview" />
    </div>

    <div id="error-msg" class="error-msg"></div>

    <!-- Predict Button -->
    <div style="margin-top: 16px;">
      <button class="btn btn-primary" id="predictBtn" onclick="predict()" disabled>
        🔍 Predict
      </button>
    </div>

    <!-- Result -->
    <div id="result-box">
      <div id="result-label"></div>
      <div id="result-confidence"></div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar" id="confidence-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Sample Images -->
    <div class="samples-title">🖼️ Try a sample image:</div>
    <div class="samples-grid" id="samplesGrid"></div>

  </div>

  <script>
    const FLASK_URL = "https://Joydeip-cat-dog-classifier.hf.space";

    // ── Sample images (public domain from Unsplash/Pexels) ──
    const samples = [
      { url: "https://upload.wikimedia.org/wikipedia/commons/7/74/A-Cat.jpg", label: "Cat 1" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/1/18/Dog_Breeds.jpg", label: "Dog 1" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/5/53/Sheba1.JPG", label: "Cat 2" },
      { url: "https://cdn.pixabay.com/photo/2024/05/25/09/30/cane-corso-8786701_1280.jpg", label: "Dog 2" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Cat_poster_1.jpg/240px-Cat_poster_1.jpg", label: "Cat 3" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Collage_of_Nine_Dogs.jpg/320px-Collage_of_Nine_Dogs.jpg", label: "Dog 3" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Orange_tabby_cat_sitting_on_fallen_leaves-Hisashi-01A.jpg/320px-Orange_tabby_cat_sitting_on_fallen_leaves-Hisashi-01A.jpg", label: "Cat 4" },
      { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Labrador_on_Quantock_%282175262184%29.jpg/320px-Labrador_on_Quantock_%282175262184%29.jpg", label: "Dog 4" },
    ];

    let currentMode = "upload"; // "upload" or "url"
    let currentUrl = "";

    // Build sample grid
    const grid = document.getElementById("samplesGrid");
    samples.forEach((s, i) => {
      const wrap = document.createElement("div");
      const img = document.createElement("img");
      img.src = s.url;
      img.className = "sample-img";
      img.title = s.label;
      img.crossOrigin = "anonymous";
      img.onerror = () => { wrap.style.display = "none"; };
      img.onclick = () => selectSample(s.url, i);
      const lbl = document.createElement("div");
      lbl.className = "sample-label";
      lbl.textContent = s.label;
      wrap.appendChild(img);
      wrap.appendChild(lbl);
      grid.appendChild(wrap);
    });

    function switchTab(tab) {
      currentMode = tab;
      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "upload") || (i === 1 && tab === "url"));
      });
      document.querySelectorAll(".tab-content").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "upload") || (i === 1 && tab === "url"));
      });
      resetResult();
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      currentMode = "upload";
      const reader = new FileReader();
      reader.onload = e => showPreview(e.target.result);
      reader.readAsDataURL(file);
      clearError();
    }

    function loadFromUrl() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return showError("Please enter a URL.");
      currentUrl = url;
      currentMode = "url";
      showPreview(url);
      clearError();
    }

    function selectSample(url, idx) {
      currentUrl = url;
      currentMode = "url";
      document.querySelectorAll(".sample-img").forEach((img, i) => {
        img.classList.toggle("selected", i === idx);
      });
      showPreview(url);
      clearError();
      resetResult();
    }

    function showPreview(src) {
      const container = document.getElementById("preview-container");
      const img = document.getElementById("preview");
      img.src = src;
      container.style.display = "block";
      document.getElementById("predictBtn").disabled = false;
      resetResult();
    }

    async function predict() {
      const btn = document.getElementById("predictBtn");
      btn.disabled = true;
      btn.textContent = "⏳ Predicting...";
      resetResult();
      clearError();

      try {
        let response;

        if (currentMode === "upload") {
          const file = document.getElementById("fileInput").files[0];
          if (!file) { showError("Please select a file first."); return; }
          const formData = new FormData();
          formData.append("file", file);
          response = await fetch(`${FLASK_URL}/predict`, { method: "POST", body: formData });

        } else {
          // URL or sample
          response = await fetch(`${FLASK_URL}/predict-url`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: currentUrl })
          });
        }

        const data = await response.json();
        if (data.error) { showError(data.error); return; }
        showResult(data.label, data.confidence);

      } catch (err) {
        showError("Could not connect to Flask server. Make sure app.py is running.");
      } finally {
        btn.disabled = false;
        btn.textContent = "🔍 Predict";
      }
    }

    function showResult(label, confidence) {
      const box = document.getElementById("result-box");
      document.getElementById("result-label").textContent = label;
      document.getElementById("result-confidence").textContent = `Confidence: ${confidence}%`;
      document.getElementById("confidence-bar").style.width = confidence + "%";
      box.style.display = "block";
    }

    function resetResult() {
      document.getElementById("result-box").style.display = "none";
      document.getElementById("confidence-bar").style.width = "0%";
    }

    function showError(msg) {
      document.getElementById("error-msg").textContent = "⚠️ " + msg;
      document.getElementById("predictBtn").disabled = false;
      document.getElementById("predictBtn").textContent = "🔍 Predict";
    }

    function clearError() {
      document.getElementById("error-msg").textContent = "";
    }
  </script>
</body>
</html>
